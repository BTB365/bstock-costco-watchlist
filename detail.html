<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BStock Listing Detail</title><style>
:root{--bg:#f5f6f8;--card:#fff;--ink:#141824;--muted:#6b7280;--line:#e5e7eb;--red:#e31837;--green:#15803d}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink)}.wrap{max-width:1280px;margin:auto;padding:18px}.bar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:800;text-decoration:none;display:inline-flex;background:#eef2f7;color:#111827;cursor:pointer}.btn.red{background:var(--red);color:#fff}.hero,.panel,.item{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 2px 10px #0000000c}.hero{padding:22px;margin:14px 0}.title{font-size:clamp(24px,4vw,42px);font-weight:950;line-height:1.1}.muted{color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:18px}.stat{background:#f9fafb;border:1px solid var(--line);border-radius:14px;padding:14px}.stat b{font-size:22px}.gallery{display:flex;gap:10px;overflow:auto;margin:16px 0}.gallery img{height:190px;min-width:230px;object-fit:cover;border-radius:14px;border:1px solid var(--line);cursor:pointer}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}input,select{border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;background:#fff}input{flex:1;min-width:260px}.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-items:start}.item{overflow:hidden;display:flex;flex-direction:column}.pic{height:240px;min-height:240px;background:#eef2f7;display:grid;place-items:center;position:relative;cursor:pointer;overflow:hidden}.pic img{display:block;width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;background:white}.pic .empty{font-size:38px}.tag{position:absolute;top:10px;left:10px;border-radius:999px;padding:5px 9px;background:#0f172a;color:#fff;font-size:11px;font-weight:900}.tag.ok{background:var(--green)}.body{padding:14px;position:relative;z-index:1;background:#fff}.desc{font-weight:900;line-height:1.2;margin-bottom:4px}.row{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);padding:8px 0}.lightbox{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;z-index:10}.lightbox.open{display:flex}.lightbox img{max-width:94vw;max-height:92vh;background:#fff;border-radius:10px}.close{position:fixed;right:18px;top:18px;color:#fff;font-size:36px;cursor:pointer}
</style></head><body><div class="wrap"><div class="bar"><a class="btn" href="index.html">← All listings</a><button class="btn red" onclick="hardRefresh()">↻ Refresh latest</button><a class="btn" target="_blank" href="https://github.com/burntheboats360/bstock-costco-watchlist/actions/workflows/refresh.yml">Run BStock sync</a></div><section id="root"></section></div><div id="lb" class="lightbox"><span class="close">×</span><img></div><script>
const money=n=>'$'+(n||0).toLocaleString('en-US',{maximumFractionDigits:2});function hardRefresh(){const u=new URL(location.href);u.searchParams.set('t',Date.now());location.href=u.toString()}const qs=new URLSearchParams(location.search);const id=qs.get('id');const lb=document.getElementById('lb');function zoom(src){if(!src)return;lb.querySelector('img').src=src;lb.classList.add('open')}lb.onclick=()=>lb.classList.remove('open');
async function load(){const data=await fetch('data/listings.json',{cache:'no-store'}).then(r=>r.json());const l=data.listings.find(x=>x.id===id);if(!l){root.innerHTML='<div class="hero"><h1>Listing not found</h1><p><a href="index.html">Back to listings</a></p></div>';return}document.title=l.lot+' · Manifest';let items=[...l.items];function render(){let q=document.getElementById('q')?.value.toLowerCase()||'';let s=document.getElementById('sort')?.value||'qty';let arr=items.filter(i=>!q||(i.item+' '+i.desc+' '+i.vendor+' '+i.cat).toLowerCase().includes(q));arr.sort((a,b)=>s==='ext'?b.ext-a.ext:s==='unit'?b.unit-a.unit:b.qty-a.qty);document.getElementById('items').innerHTML=arr.map(i=>`<article class="item"><div class="pic" onclick="zoom('${i.img||''}')">${i.img?`<img src="${i.img}" referrerpolicy="no-referrer"><span class="tag ok">Costco item # match</span>`:`<span class="empty">🔎</span><span class="tag">search item #</span>`}</div><div class="body"><div class="desc">${i.desc}</div><div class="muted">Item # ${i.item} · ${i.cat||''}</div><div class="row"><span>Qty</span><b>${i.qty}</b></div><div class="row"><span>Unit retail</span><b>${money(i.unit)}</b></div><div class="row"><span>Ext. retail</span><b>${money(i.ext)}</b></div><div class="row"><span>Vendor</span><b style="text-align:right">${i.vendor||'—'}</b></div><a class="btn" target="_blank" href="${i.costcoUrl||('https://sameday.costco.com/search?search_term='+i.item)}">Open Costco item search</a></div></article>`).join('')}
root.innerHTML=`<section class="hero"><div class="title">${l.title}</div><p class="muted">${l.prettyId} · ${l.location} · Ends ${new Date(l.endTime).toLocaleString()}</p><div class="stats"><div class="stat"><span class="muted">Current bid</span><br><b>${money(l.currentBid)}</b></div><div class="stat"><span class="muted">Ext. retail</span><br><b>${money(l.msrp)}</b></div><div class="stat"><span class="muted">Total wholesale cost</span><br><b>${money(l.currentBid+(l.shipCost||0))}</b><br><span class="muted">${l.shipCostNote||'current bid + shipping'}</span></div><div class="stat"><span class="muted">Pallets / spaces</span><br><b>${l.shipment.pallets} / ${l.shipment.spaces}</b></div><div class="stat"><span class="muted">Weight</span><br><b>${l.shipment.weight.toLocaleString()} lbs</b></div><div class="stat"><span class="muted">Manifest rows shown</span><br><b>${l.items.length}</b></div></div><p class="muted">${l.manifestNote||''}</p><div class="gallery">${(l.images||[]).map(src=>`<img src="${src}" onclick="zoom('${src}')" referrerpolicy="no-referrer">`).join('')}</div><p><a class="btn red" target="_blank" href="${l.href}">Open BStock listing</a></p></section><div class="toolbar"><input id="q" placeholder="Search full manifest"><select id="sort"><option value="qty">Highest QTY</option><option value="ext">Highest ext retail</option><option value="unit">Highest unit retail</option></select></div><section id="items" class="items"></section>`;document.getElementById('q').oninput=render;document.getElementById('sort').onchange=render;render()}load();
</script></body></html>
