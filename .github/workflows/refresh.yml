name: Refresh BStock data
on:
  schedule:
    # 8:30 AM America/Denver during MDT = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      - name: Refresh BStock snapshot
        env:
          BSTOCK_EMAIL: ${{ secrets.BSTOCK_EMAIL }}
          BSTOCK_PASSWORD: ${{ secrets.BSTOCK_PASSWORD }}
          BSTOCK_SAVED_SEARCH_URL: https://bstock.com/all-auctions?savedSearchId=696e3b9488671096827bcdd8
        run: npm run refresh
      - name: Commit refreshed data
        run: |
          git config user.name "bstock-refresh-bot"
          git config user.email "actions@github.com"
          git add data
          git commit -m "Refresh BStock listings" || exit 0
          git push
      - name: Deploy to Netlify when token secrets are available
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Netlify token/site secrets not set; relying on Git-connected Netlify auto deploy."
            exit 0
          fi
          npx netlify-cli deploy --prod --dir . --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
